serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''
service: {type: ClusterIP, port: 80}
ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
  - host: chart-example.local
    paths:
    - {path: /, pathType: ImplementationSpecific}
  tls: []
autoscaling: {enabled: false, minReplicas: 1, maxReplicas: 100, targetCPUUtilizationPercentage: 80}
system: {name: systemone, pathName: systemOne}
dockerRepository: {url: docker.epc.ub.uu.se/}
initContainers:
  waitForDb:
  - name: init-wait-for-db
    image: alpine
    command: [/bin/sh, -c, while ! nc -zvw1 systemone-postgresql 5432; do sleep 1;
        done]
  waitForMq:
  - name: check-rabbitmq
    image: alpine
    command: [sh, -c, until nc -z -v -w1 systemone-rabbitmq 5672; do echo "Waiting
        for RabbitMQ.."; sleep 5; done]
deploy: {fitnesse: false, jsclient: true}
port: {rest: 30080, login: 30180, jsclient: 30280, idplogin: 30380, fitnesse: 30580}
dockers:
  rabbitmq: !!org.codehaus.groovy.runtime.GStringImpl
    metaClass: &id001 !!groovy.lang.MetaClassImpl {}
  fedora: cora-docker-fedora:1.0-SNAPSHOT
  solr: cora-docker-solr:1.0-SNAPSHOT
  idplogin: !!org.codehaus.groovy.runtime.GStringImpl
    metaClass: *id001
  iip: cora-docker-iipimageserver:1.0-SNAPSHOT
  postgresql: systemone-docker-postgresql:1.0-SNAPSHOT
  fitnesse: systemone-docker-fitnesse:1.2-SNAPSHOT
  gatekeeper: systemone-docker-gatekeeper:1.0-SNAPSHOT
  jsclient: cora-docker-jsclient:1.0-SNAPSHOT
  rest: systemone-docker:1.0-SNAPSHOT
  login: cora-docker-login:1.0-SNAPSHOT
