serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
system:
  name: systemone
  pathName: systemOne
dockerRepository:
  url: docker.epc.ub.uu.se/
initContainers:
  waitForDb:
  - name: init-wait-for-db
    image: alpine
    command:
    - /bin/sh
    - -c
    - while ! nc -zvw1 systemone-postgresql 5432; do sleep 1; done
  waitForMq:
  - name: check-rabbitmq
    image: alpine
    command:
    - sh
    - -c
    - until nc -z -v -w1 systemone-rabbitmq 5672; do echo "Waiting for RabbitMQ..";
      sleep 5; done
deploy:
  fitnesse: false
  jsclient: true
port:
  rest: 30080
  login: 30180
  jsclient: 30280
  idplogin: 30380
  fitnesse: 30580
docker:
  rabbitmq: cora-docker-rabbitmq:1.0.0
  fedora: cora-docker-fedora:0.0-SNAPSHOT
  solr: cora-docker-solr:0.0-SNAPSHOT
  idplogin: cora-docker-idplogin:0.3.0
  iip: cora-docker-iipimageserver:0.0-SNAPSHOT
  postgresql: systemone-docker-postgresql:0.0-SNAPSHOT
  fitnesse: systemone-docker-fitnesse:0.2-SNAPSHOT
  gatekeeper: cora-docker-gatekeeper:0.8.0
  jsclient: cora-docker-jsclient:0.0-SNAPSHOT
  rest: systemone-docker:0.0-SNAPSHOT
  login: cora-docker-login:0.0-SNAPSHOT
